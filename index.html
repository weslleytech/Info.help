.card-service {

.card-service::after {

  position: absolute;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background: radial-gradient(circle, rgba(14,165,233,0.3), transparent 60%);

}

.card-service:active::after {
